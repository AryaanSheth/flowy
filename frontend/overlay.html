<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowy Overlay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: transparent;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      font-synthesis: none;
    }

    /* ── Pill ────────────────────────────────────────────────────── */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 8px 15px 8px 12px;
      border-radius: 99px;

      /* Frosted dark glass */
      background: rgba(11, 12, 9, 0.88);
      backdrop-filter: blur(28px) saturate(1.5);
      -webkit-backdrop-filter: blur(28px) saturate(1.5);

      /* Hairline border + subtle top sheen */
      border: 0.5px solid rgba(255, 255, 255, 0.10);
      box-shadow:
        0 2px 14px rgba(0, 0, 0, 0.55),
        0 0 0 0.5px rgba(0, 0, 0, 0.5),
        inset 0 0.5px 0 rgba(255, 255, 255, 0.08);

      /* Entry: drop from above + spring scale */
      opacity: 0;
      transform: translateY(-7px) scale(0.93);
      transition:
        opacity  200ms cubic-bezier(0.2, 0, 0, 1),
        transform 280ms cubic-bezier(0.34, 1.56, 0.64, 1);

      will-change: opacity, transform;
    }

    /* ── Visible state (toggled by JS) ──────────────────────────── */
    body.show .pill {
      opacity: 1;
      transform: none;
    }

    /* Exit: fade + slide back up */
    body.hiding .pill {
      opacity: 0;
      transform: translateY(-5px) scale(0.95);
      transition:
        opacity  180ms ease-in,
        transform 180ms ease-in;
    }

    /* ── Waveform bars ───────────────────────────────────────────── */
    .bars {
      display: flex;
      align-items: center;
      gap: 2.5px;
      height: 20px;
    }

    .b {
      width: 2.5px;
      height: 3px;
      border-radius: 2px;
      background: #4dbfcb;
      transform-origin: center bottom;
      animation: bar var(--d) ease-in-out infinite var(--del);
    }

    @keyframes bar {
      0%, 100% { height: 3px;       opacity: 0.38; }
      50%       { height: var(--h); opacity: 1;    }
    }

    /* ── Label ───────────────────────────────────────────────────── */
    .lbl {
      font: 500 13px/1 -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      color: rgba(228, 224, 213, 0.90);
      letter-spacing: 0.01em;
      white-space: nowrap;
      user-select: none;
    }

    /* ── Transcribing state ──────────────────────────────────────── */
    body.transcribing .b {
      background: #7bb8c4;
      animation-name: bar-slow;
    }

    @keyframes bar-slow {
      0%, 100% { height: 3px;       opacity: 0.25; }
      50%       { height: var(--h); opacity: 0.75; }
    }

    body.transcribing .lbl {
      color: rgba(196, 160, 72, 0.88);
    }
  </style>
</head>
<body>
  <div class="pill">
    <div class="bars" id="bars"></div>
    <span class="lbl" id="lbl">Recording</span>
  </div>

  <script>
    // ── Bar definitions [maxHeight, duration, delay] ──────────────
    const BARS = [
      ['5px',  '1.12s', '0.00s'],
      ['12px', '0.90s', '0.08s'],
      ['19px', '1.22s', '0.16s'],
      ['21px', '0.82s', '0.04s'],
      ['17px', '1.08s', '0.20s'],
      ['11px', '0.96s', '0.12s'],
      ['6px',  '1.18s', '0.24s'],
    ];

    const barsEl = document.getElementById('bars');
    BARS.forEach(([h, d, del]) => {
      const el = document.createElement('div');
      el.className = 'b';
      el.style.cssText = `--h:${h};--d:${d};--del:${del}`;
      barsEl.appendChild(el);
    });

    const lbl = document.getElementById('lbl');
    let hideTimer = null;

    function applyStatus(status) {
      clearTimeout(hideTimer);

      if (status === 'Recording') {
        document.body.classList.remove('transcribing', 'hiding');
        lbl.textContent = 'Recording';
        // Two rAFs so the browser paints opacity:0 first, then transitions in.
        requestAnimationFrame(() =>
          requestAnimationFrame(() => document.body.classList.add('show'))
        );

      } else if (status === 'Transcribing') {
        document.body.classList.remove('hiding');
        document.body.classList.add('transcribing', 'show');
        lbl.textContent = 'Transcribing…';

      } else {
        // Idle — play the exit animation
        document.body.classList.remove('show');
        document.body.classList.add('hiding');
        // Rust will call win.hide() after 350ms; animation is ~180ms.
      }
    }

    // ── Listen for status events from Rust ────────────────────────
    if (window.__TAURI__?.event) {
      window.__TAURI__.event.listen('flowy:status', ({ payload }) => {
        applyStatus(payload);
      });
    }
  </script>
</body>
</html>
