name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  macos:
    name: macOS Build & Tests
    runs-on: macos-15
    env:
      FLOWY_CI_VERSION: 1.2.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build app bundle
        run: scripts/build-macos.sh --debug --check-only --version "$FLOWY_CI_VERSION"

      - name: Verify app version override
        run: |
          PLIST="target/debug/bundle/macos/Flowy.app/Contents/Info.plist"
          SHORT_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$PLIST")"
          BUILD_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$PLIST")"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$FLOWY_CI_VERSION"
          EXPECTED_BUILD="$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))"

          if [[ "$SHORT_VERSION" != "$FLOWY_CI_VERSION" ]]; then
            echo "CFBundleShortVersionString mismatch: expected $FLOWY_CI_VERSION, got $SHORT_VERSION" >&2
            exit 1
          fi

          if [[ "$BUILD_VERSION" != "$EXPECTED_BUILD" ]]; then
            echo "CFBundleVersion mismatch: expected $EXPECTED_BUILD, got $BUILD_VERSION" >&2
            exit 1
          fi

      - name: Run Swift tests
        run: swift test

      - name: Build release candidate app
        run: scripts/build-macos.sh --release --check-only --clean --version "$FLOWY_CI_VERSION"

      - name: Package release candidate DMG
        run: scripts/package-dmg.sh "$FLOWY_CI_VERSION"

      - name: Verify release candidate metadata
        run: |
          PLIST="target/release/bundle/macos/Flowy.app/Contents/Info.plist"
          SHORT_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$PLIST")"
          BUILD_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$PLIST")"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$FLOWY_CI_VERSION"
          EXPECTED_BUILD="$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))"

          if [[ "$SHORT_VERSION" != "$FLOWY_CI_VERSION" ]]; then
            echo "CFBundleShortVersionString mismatch: expected $FLOWY_CI_VERSION, got $SHORT_VERSION" >&2
            exit 1
          fi

          if [[ "$BUILD_VERSION" != "$EXPECTED_BUILD" ]]; then
            echo "CFBundleVersion mismatch: expected $EXPECTED_BUILD, got $BUILD_VERSION" >&2
            exit 1
          fi

      - name: Verify release candidate DMG contents
        run: |
          DMG="target/release/Flowy-${FLOWY_CI_VERSION}.dmg"
          if [[ ! -f "$DMG" ]]; then
            echo "DMG not found: $DMG" >&2
            exit 1
          fi

          MOUNT_OUTPUT="$(hdiutil attach "$DMG" -readonly -noverify -noautoopen)"
          MOUNT_POINT="$(printf '%s\n' "$MOUNT_OUTPUT" | awk '/\/Volumes\// {print substr($0, index($0, "/Volumes/")); exit}')"
          cleanup() {
            [[ -n "${MOUNT_POINT:-}" ]] && hdiutil detach "$MOUNT_POINT" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          if [[ -z "$MOUNT_POINT" || ! -d "$MOUNT_POINT" ]]; then
            echo "Could not mount DMG" >&2
            printf '%s\n' "$MOUNT_OUTPUT" >&2
            exit 1
          fi

          test -d "$MOUNT_POINT/Flowy.app"
          test -L "$MOUNT_POINT/Applications"
          test "$(readlink "$MOUNT_POINT/Applications")" = "/Applications"

      - name: Upload release candidate DMG
        uses: actions/upload-artifact@v4
        with:
          name: Flowy-${{ env.FLOWY_CI_VERSION }}-dmg
          path: target/release/Flowy-${{ env.FLOWY_CI_VERSION }}.dmg
