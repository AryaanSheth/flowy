name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.5.1)'
        required: true
        default: '0.5.1'

jobs:
  build:
    name: Build & Package
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.ref_name }}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Warm Swift module cache
        run: xcrun swift -e 'import Foundation; print("ok")'

      - name: Install Sparkle
        env:
          FLOWY_SPARKLE_PUBLIC_ED_KEY: ${{ vars.FLOWY_SPARKLE_PUBLIC_ED_KEY }}
        run: |
          if [[ -n "${FLOWY_SPARKLE_PUBLIC_ED_KEY:-}" ]]; then
            scripts/install-sparkle.sh
          else
            echo "FLOWY_SPARKLE_PUBLIC_ED_KEY is not configured; building without Sparkle auto-update"
          fi

      - name: Build app
        env:
          FLOWY_SPARKLE_PUBLIC_ED_KEY: ${{ vars.FLOWY_SPARKLE_PUBLIC_ED_KEY }}
        run: scripts/build-macos.sh --check-only
        # --check-only builds the bundle and skips the launch hint

      - name: Package DMG
        run: scripts/package-dmg.sh "${{ steps.ver.outputs.version }}"

      - name: Generate Sparkle appcast
        env:
          FLOWY_SPARKLE_PRIVATE_ED_KEY: ${{ secrets.FLOWY_SPARKLE_PRIVATE_ED_KEY }}
        run: |
          if [[ -n "${FLOWY_SPARKLE_PRIVATE_ED_KEY:-}" ]]; then
            scripts/generate-appcast.sh "${{ steps.ver.outputs.version }}" "target/release/Flowy-${{ steps.ver.outputs.version }}.dmg"
          else
            echo "FLOWY_SPARKLE_PRIVATE_ED_KEY is not configured; skipping appcast generation"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          # Versioned file produced by package-dmg.sh
          DMG_VERSIONED="target/release/Flowy-${VERSION}.dmg"
          # Stable name so the website's direct-download URL never changes
          DMG="target/release/Flowy.dmg"
          cp "$DMG_VERSIONED" "$DMG"
          ASSETS=("$DMG_VERSIONED" "$DMG")
          if [[ -f "target/release/appcast.xml" ]]; then
            ASSETS+=("target/release/appcast.xml")
          fi

          NOTES="## Flowy ${VERSION}

          **macOS 13+, Apple Silicon**

          ### Install
          1. Download the .dmg below
          2. Open it and drag **Flowy** to Applications
          3. Launch Flowy — it lives in your menu bar
          4. Grant Microphone and Speech Recognition when prompted
          5. Set your hotkey in Settings and start speaking

          > First launch: macOS may say the app is from an unidentified developer.
          > Right-click the app → **Open** → **Open** to bypass Gatekeeper once.
          "

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            gh release create "$TAG" "${ASSETS[@]}" \
              --title "Flowy ${VERSION}" \
              --notes "$NOTES" \
              --prerelease
          else
            gh release create "$TAG" "${ASSETS[@]}" \
              --title "Flowy ${VERSION}" \
              --notes "$NOTES"
          fi
