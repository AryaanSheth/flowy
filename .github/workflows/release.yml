name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build & Package
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Warm Swift module cache
        run: xcrun swift -e 'import Foundation; print("ok")'

      - name: Install Sparkle
        env:
          FLOWY_SPARKLE_PUBLIC_ED_KEY: ${{ vars.FLOWY_SPARKLE_PUBLIC_ED_KEY }}
        run: |
          if [[ -z "${FLOWY_SPARKLE_PUBLIC_ED_KEY:-}" ]]; then
            echo "FLOWY_SPARKLE_PUBLIC_ED_KEY is required for release builds" >&2
            exit 1
          fi
          scripts/install-sparkle.sh

      - name: Build app
        env:
          FLOWY_SPARKLE_PUBLIC_ED_KEY: ${{ vars.FLOWY_SPARKLE_PUBLIC_ED_KEY }}
          FLOWY_VERSION: ${{ steps.ver.outputs.version }}
        run: scripts/build-macos.sh --check-only
        # --check-only builds the bundle and skips the launch hint

      - name: Verify built app version
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          PLIST="target/release/bundle/macos/Flowy.app/Contents/Info.plist"
          SHORT_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$PLIST")"
          BUILD_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$PLIST")"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          EXPECTED_BUILD="$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))"

          if [[ "$SHORT_VERSION" != "$VERSION" ]]; then
            echo "CFBundleShortVersionString mismatch: expected $VERSION, got $SHORT_VERSION" >&2
            exit 1
          fi

          if [[ "$BUILD_VERSION" != "$EXPECTED_BUILD" ]]; then
            echo "CFBundleVersion mismatch: expected $EXPECTED_BUILD, got $BUILD_VERSION" >&2
            exit 1
          fi

      - name: Package DMG
        run: scripts/package-dmg.sh "${{ steps.ver.outputs.version }}"

      - name: Generate release notes page
        run: scripts/generate-release-notes.sh "${{ steps.ver.outputs.version }}" "target/release/release-notes.html"

      - name: Generate Sparkle appcast
        env:
          FLOWY_SPARKLE_PRIVATE_ED_KEY: ${{ secrets.FLOWY_SPARKLE_PRIVATE_ED_KEY }}
        run: |
          if [[ -z "${FLOWY_SPARKLE_PRIVATE_ED_KEY:-}" ]]; then
            echo "FLOWY_SPARKLE_PRIVATE_ED_KEY is required for release builds" >&2
            exit 1
          fi
          scripts/generate-appcast.sh "${{ steps.ver.outputs.version }}" "target/release/Flowy-${{ steps.ver.outputs.version }}.dmg"

      - name: Verify Sparkle appcast
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          APPCAST="target/release/appcast.xml"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          EXPECTED_BUILD="$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))"
          EXPECTED_DMG_URL="https://github.com/AryaanSheth/flowy/releases/download/v${VERSION}/Flowy-${VERSION}.dmg"

          if [[ ! -f "$APPCAST" ]]; then
            echo "Appcast not found: $APPCAST" >&2
            exit 1
          fi

          xmllint --noout "$APPCAST"

          grep -Fq "<sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>" "$APPCAST" || {
            echo "Appcast short version does not match $VERSION" >&2
            exit 1
          }
          grep -Fq "<sparkle:version>${EXPECTED_BUILD}</sparkle:version>" "$APPCAST" || {
            echo "Appcast build version does not match $EXPECTED_BUILD" >&2
            exit 1
          }
          grep -Fq "url=\"${EXPECTED_DMG_URL}\"" "$APPCAST" || {
            echo "Appcast enclosure URL does not match $EXPECTED_DMG_URL" >&2
            exit 1
          }
          grep -Fq 'sparkle:edSignature="' "$APPCAST" || {
            echo "Appcast enclosure is missing sparkle:edSignature" >&2
            exit 1
          }
          grep -Fq 'length="' "$APPCAST" || {
            echo "Appcast enclosure is missing length" >&2
            exit 1
          }

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          # Versioned file produced by package-dmg.sh
          DMG_VERSIONED="target/release/Flowy-${VERSION}.dmg"
          # Stable name so the website's direct-download URL never changes
          DMG="target/release/Flowy.dmg"
          cp "$DMG_VERSIONED" "$DMG"
          ASSETS=("$DMG_VERSIONED" "$DMG")
          if [[ -f "target/release/appcast.xml" ]]; then
            ASSETS+=("target/release/appcast.xml")
          fi
          if [[ -f "target/release/release-notes.html" ]]; then
            ASSETS+=("target/release/release-notes.html")
          fi

          NOTES="## Flowy ${VERSION}

          **macOS 13+, Apple Silicon**

          ### Install
          1. Download the .dmg below
          2. Open it and drag **Flowy** to Applications
          3. Launch Flowy — it lives in your menu bar
          4. Grant Microphone, Speech Recognition, and Accessibility when prompted
          5. Set your hotkey in Settings and start speaking

          > First launch: macOS may say the app is from an unidentified developer.
          > Right-click the app → **Open** → **Open** to bypass Gatekeeper once.
          "

          gh release create "$TAG" "${ASSETS[@]}" \
            --title "Flowy ${VERSION}" \
            --notes "$NOTES"
